<!DOCTYPE html>

<head>

    <title>專業驗屋自驗紀錄表 - 完整項目版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        details[open] summary ~ * {
            animation: sweep .3s ease-in-out;
        }
        @keyframes sweep {
            0%    {opacity: 0; transform: translateY(-10px)}
            100%  {opacity: 1; transform: translateY(0)}
        }
        .progress-bar {
            transition: width 0.4s ease-in-out;
        }
        .status-btn.active-pass {
            background-color: #22c55e;
            color: white;
            border-color: #16a34a;
        }
        .status-btn.active-fail {
            background-color: #ef4444;
            color: white;
            border-color: #dc2626;
        }
        .row-fail textarea {
            border-color: #fca5a5;
            background-color: #fef2f2;
        }
        .item-link {
            color: #2563eb;
            text-decoration: underline;
            text-underline-offset: 4px;
            font-weight: 600;
        }
        .item-link:hover {
            color: #1d4ed8;
            background-color: #eff6ff;
        }
        summary::-webkit-details-marker { display: none; }
        summary { list-style: none; }

        @media print {
            .no-print { display: none; }
            details { border: 1px solid #ccc !important; margin-bottom: 10px !important; display: block !important; }
            details summary { background: #f0f0f0 !important; }
            .section-reset-btn { display: none !important; }
            main { margin-top: 0 !important; }
            .fixed { position: relative !important; }
            .item-link { text-decoration: none; color: black; pointer-events: none; }
        }
    </style>
</head>

        function renderAllSections() {
            const main = document.getElementById('main-content');
            main.innerHTML = ''; 
            checklistData.forEach((section, index) => {
                const sectionId = index + 1;
                const sectionEl = document.createElement('section');
                sectionEl.id = `sec-container-${sectionId}`;
                sectionEl.className = "mb-6 relative";
                
                sectionEl.innerHTML = `
                    <div class="absolute right-12 top-4 z-20 flex items-center gap-2">
                        <button type="button" 
                            onclick="resetSection(${sectionId})" 
                            class="section-reset-btn text-[11px] bg-red-50 border border-red-200 text-red-600 px-3 py-1 rounded hover:bg-red-500 hover:text-white transition-all font-bold shadow-sm">
                            清除此區
                        </button>
                    </div>
                    <details class="group bg-white rounded-xl shadow-md overflow-hidden border border-slate-200" ${sectionId === 1 ? 'open' : ''}>
                        <summary class="flex justify-between items-center p-5 cursor-pointer bg-slate-100 hover:bg-slate-200 transition-colors list-none">
                            <div class="flex items-center gap-4">
                                <span class="text-lg font-bold text-slate-700">
                                    ${section.title} 
                                    <span class="ml-4 text-sm font-normal text-slate-500">
                                        (合格: <span id="pass-count-${sectionId}">0</span> 缺失: <span id="fail-count-${sectionId}">0</span>)
                                    </span>
                                </span>
                            </div>
                            <span class="category-count text-xs font-bold bg-white text-blue-600 px-3 py-1 rounded-full border shadow-sm mr-24">
                                0 / ${section.items.length}
                            </span>
                        </summary>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <tbody class="divide-y divide-slate-100" id="group-${sectionId}">
                                    ${section.items.map(item => `
                                        <tr class="item-row hover:bg-slate-50 transition-colors border-b border-slate-100">
                                            <td class="p-4 text-sm text-slate-700 font-medium leading-relaxed">
                                                <span class="mr-2 text-slate-400 font-mono">${item.id}</span>
                                                ${item.link ? `<a href="${item.link}" target="_blank" class="item-link">${item.text}</a>` : item.text}
                                            </td>
                                            <td class="p-4 text-center">
                                                <div class="flex gap-2 justify-center">
                                                    <button type="button" onclick="setStatus(this, 'pass')" class="status-btn pass-btn border border-slate-200 px-3 py-1.5 rounded-lg text-xs transition-all font-bold">合格</button>
                                                    <button type="button" onclick="setStatus(this, 'fail')" class="status-btn fail-btn border border-slate-200 px-3 py-1.5 rounded-lg text-xs transition-all font-bold">缺失</button>
                                                </div>
                                            </td>
                                            <td class="p-4">
                                                <textarea placeholder="缺失說明及位置..." class="w-full border border-slate-200 rounded-lg p-2 text-xs h-10 resize-none focus:border-blue-400 outline-none"></textarea>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </details>
                `;
                main.appendChild(sectionEl);
            });
        }

        function setStatus(btn, status) {
            const row = btn.closest('.item-row');
            const buttons = row.querySelectorAll('.status-btn');
            buttons.forEach(b => b.classList.remove('active-pass', 'active-fail'));
            
            if (status === 'pass') {
                btn.classList.add('active-pass');
                row.setAttribute('data-result', '合格');
                row.classList.remove('row-fail');
            } else {
                btn.classList.add('active-fail');
                row.setAttribute('data-result', '缺失');
                row.classList.add('row-fail');
            }
            updateProgress();
        }

        function resetSection(sectionId) {
            const title = checklistData[sectionId - 1].title;
            if(!confirm(`確定要清除「${title}」的所有輸入紀錄嗎？`)) return;
            
            const group = document.getElementById(`group-${sectionId}`);
            if (!group) return;

            const rows = group.querySelectorAll('.item-row');
            rows.forEach(row => {
                row.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active-pass', 'active-fail'));
                row.removeAttribute('data-result');
                row.classList.remove('row-fail');
                const area = row.querySelector('textarea');
                if (area) area.value = '';
            });

            updateProgress();
        }

        function updateProgress() {
            const allRows = document.querySelectorAll('.item-row');
            const completedRows = document.querySelectorAll('.item-row[data-result]');
            const percent = (completedRows.length / allRows.length) * 100 || 0;
            
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('percentText').innerText = Math.round(percent) + '%';

            checklistData.forEach((_, index) => {
                const sId = index + 1;
                const group = document.getElementById(`group-${sId}`);
                if (!group) return;
                
                const passes = group.querySelectorAll('.item-row[data-result="合格"]').length;
                const fails = group.querySelectorAll('.item-row[data-result="缺失"]').length;
                const total = group.querySelectorAll('.item-row').length;
                
                document.getElementById(`pass-count-${sId}`).innerText = passes;
                document.getElementById(`fail-count-${sId}`).innerText = fails;
                
                const section = group.closest('section');
                const badge = section.querySelector('.category-count');
                if (badge) badge.innerText = `${passes + fails} / ${total}`;
            });
        }

        function sendEmail() {
            const houseId = document.getElementById('houseId').value || "未填寫";
            let body = `驗屋報告 - ${houseId}\r\n`;
            document.querySelectorAll('.item-row[data-result]').forEach(row => {
                const id = row.querySelector('.font-mono').innerText;
                const text = row.querySelector('td').innerText.split('\n')[0].replace(id, '').trim();
                const result = row.getAttribute('data-result');
                const note = row.querySelector('textarea').value;
                body += `${id} ${text}: [${result}] ${note ? '('+note+')' : ''}\r\n`;
            });
            window.location.href = `mailto:cosa1023@gmail.com?subject=報告_${houseId}&body=${encodeURIComponent(body)}`;
        }

        function resetAll() {
            if(confirm('確定要全部清空並重新開始嗎？')) location.reload();
        }

        window.onload = function() {
            document.getElementById('inspectDate').valueAsDate = new Date();
            renderAllSections();
            updateProgress();
        };
    </script>
